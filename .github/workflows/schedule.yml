name: Instagram & Twitter Data Update

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 09:00 KST
    - cron: '0 0 * * 4'  # 매주 목요일 09:00 KST
  workflow_dispatch:
    inputs:
      mode:
        description: '수집 모드 (all: 전체 / brand: 브랜드만)'
        required: false
        default: 'all'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas apify-client

      - name: Run Instagram update
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          COLLECT_MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 0 * * 1' && 'all' || 'brand') }}
        run: python update_data.py

      - name: Run Twitter update
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python update_data_twitter.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update data: $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin main

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python notify_slack.py
