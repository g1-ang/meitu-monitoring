name: Weekly Data Update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 이 부분이 로봇에게 파일 쓰기 권한을 줍니다.
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas apify-client

      - name: Run update script
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python update_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 파일이 바뀐 게 있는지 확인하고 강제로 스테이징
          git add data/latest_monitoring.csv
          
          # 변경사항이 있든 없든(시간 값이 포함되어 무조건 생김) 커밋
          git commit -m "Auto-update data: $(date)" || echo "No changes to commit"
          
          # 꼬여있는 경로를 무시하고 현재 메인 브랜치에 강제로 밀어넣기
          git push origin main --force
